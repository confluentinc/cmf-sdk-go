openapi: 3.0.1
info:
  description: Apache Flink job lifecycle management component for Confluent Platform.
  title: Confluent Manager for Apache Flink / CMF
  version: "1.0"
servers:
- url: http://localhost:8080
tags:
- name: C3
- name: Environments
- name: FlinkApplications
- name: Secrets
- name: SQL
- name: Savepoints
- name: KubernetesClusters
paths:
  /cmf/api/v1/environments:
    get:
      operationId: getEnvironments
      parameters:
      - description: Zero-based page index (0..N)
        explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      - description: The size of the page to be returned
        explode: true
        in: query
        name: size
        required: false
        schema:
          type: integer
        style: form
      - description: 'Sorting criteria in the format: property,(asc|desc). Default
          sort order is ascending. Multiple sort criteria are supported.'
        explode: true
        in: query
        name: sort
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Whether to include resource summary in the response.
        explode: true
        in: query
        name: include-resource-information
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: 'Filter query string with comma-separated expressions. Supports:
          - Name filtering: name=foo*bar (wildcards allowed) - Label equality: labels.key
          = value or labels.key != value - Label set-based: labels.key in (value1,
          value2) or labels.key notin (value1, value2) - Label existence: labels.key
          (exists) or !labels.key (does not exist) - State filtering (Applications
          only): state=RUNNING or state in (RUNNING, FAILED) or state notin (RUNNING,
          FAILED) - Phase filtering (Statements and ComputePools): phase=PENDING or
          phase in (PENDING, RUNNING) or phase notin (PENDING, RUNNING) - Type filtering
          (Events only): type=CMF_STATUS or type in (CMF_STATUS, JOB_STATUS) or type
          notin (CMF_STATUS, JOB_STATUS) Example: ?filter=name=foo*bar,labels.environment
          in (production, qa),!labels.development Example (with state): ?filter=name=prod*,state
          in (RUNNING, FAILED) Example (with phase): ?filter=name=my-stmt*,phase in
          (PENDING, RUNNING) Example (with type): ?filter=type=CMF_STATUS or ?filter=type
          in (CMF_STATUS, JOB_STATUS)'
        explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
      - description: 'Search term to match against fields specified in searchScope.
          Note: Both search and searchScope must be provided together. If only one
          is provided, the request will be rejected. Example: ?search=foo&searchScope=name,kubernetesNamespace'
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: 'Comma-separated list of fields to search in. Must be provided
          together with the search parameter. Unsupported field names will result
          in a 400 Bad Request. For Environments: supported fields are name, kubernetesNamespace.
          For Statements: supported fields are name, statement. For Events: supported
          fields are message, flinkApplicationInstance. For Secrets: supported fields
          are name, environments. When multiple fields are specified, the search uses
          OR logic. Example (Environments): ?search=foo&searchScope=name,kubernetesNamespace
          means (name contains foo OR kubernetesNamespace contains foo) Example (Statements):
          ?search=SELECT&searchScope=name,statement means (name contains SELECT OR
          statement contains SELECT) Example (Events): ?search=RUNNING&searchScope=message,flinkApplicationInstance
          means (message contains RUNNING OR flinkApplicationInstance equals RUNNING)'
        explode: true
        in: query
        name: searchScope
        required: false
        schema:
          type: string
        style: form
      - description: 'Comma-separated list of field paths to include in the response.
          Supports nested fields using dot notation. Always includes apiVersion and
          kind fields even if not explicitly requested. Example: ?fields=metadata.name,metadata.createdTimestamp,status.phase'
        explode: true
        in: query
        name: fields
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentsPage'
            application/yaml:
              schema:
                $ref: '#/components/schemas/EnvironmentsPage'
          description: List of environments found. If no environments are found, an
            empty list is returned. Note the information about secret is not included
            in the list call yet. In order to get the information about secret, make
            a getSecret call.
        "304":
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              explode: false
              schema:
                type: string
              style: simple
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Retrieve a paginated list of all environments.
      tags:
      - Environments
      x-spring-paginated: true
    post:
      operationId: createOrUpdateEnvironment
      requestBody:
        content:
          application/json:
            examples:
              basic-environment:
                summary: Basic Environment
                value:
                  name: production
                  kubernetesNamespace: flink-production
                  flinkApplicationDefaults:
                    spec:
                      flinkConfiguration:
                        taskmanager.numberOfTaskSlots: "4"
                        rest.profiling.enabled: "true"
                      jobManager:
                        resource:
                          memory: 1024m
                          cpu: 1
                      taskManager:
                        resource:
                          memory: 1024m
                          cpu: 1
                  computePoolDefaults:
                    clusterSpec:
                      flinkVersion: v1_19
                      image: confluentinc/cp-flink-sql:1.19-cp5
                      flinkConfiguration:
                        taskmanager.numberOfTaskSlots: "4"
                  statementDefaults:
                    detached:
                      flinkConfiguration:
                        state.backend.type: hashmap
                    interactive:
                      flinkConfiguration:
                        state.backend.type: hashmap
            schema:
              $ref: '#/components/schemas/PostEnvironment'
          application/yaml:
            examples:
              basic-environment-yaml:
                summary: Basic Environment (YAML)
                value:
                  name: staging
                  kubernetesNamespace: flink-staging
                  flinkApplicationDefaults:
                    spec:
                      flinkConfiguration:
                        taskmanager.numberOfTaskSlots: "2"
                        rest.profiling.enabled: "true"
                      jobManager:
                        resource:
                          memory: 1024m
                          cpu: 1
                      taskManager:
                        resource:
                          memory: 1024m
                          cpu: 1
            schema:
              $ref: '#/components/schemas/PostEnvironment'
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                created-environment:
                  summary: Created Environment
                  value:
                    name: production
                    kubernetesNamespace: flink-production
                    created_time: 2024-01-15T10:30:00Z
                    updated_time: 2024-01-15T10:30:00Z
                    flinkApplicationDefaults:
                      spec:
                        flinkConfiguration:
                          taskmanager.numberOfTaskSlots: "4"
                          rest.profiling.enabled: "true"
                        jobManager:
                          resource:
                            memory: 1024m
                            cpu: 1
                        taskManager:
                          resource:
                            memory: 1024m
                            cpu: 1
                    computePoolDefaults:
                      clusterSpec:
                        flinkVersion: v1_19
                        image: confluentinc/cp-flink-sql:1.19-cp5
                        flinkConfiguration:
                          taskmanager.numberOfTaskSlots: "4"
                    statementDefaults:
                      detached:
                        flinkConfiguration:
                          state.backend.type: hashmap
                      interactive:
                        flinkConfiguration:
                          state.backend.type: hashmap
                    secrets: {}
              schema:
                $ref: '#/components/schemas/Environment'
            application/yaml:
              schema:
                $ref: '#/components/schemas/Environment'
          description: The Environment was successfully created or updated.
        "400":
          content:
            application/json:
              examples:
                validation-error:
                  summary: Validation Error
                  value:
                    errors:
                    - message: 'name: size must be between 4 and 2147483647'
                    - message: Environment's kubernetesNamespace 'fl' does not exist.
                    - message: Environment's kubernetesClusterName 'nonexistent' does
                        not exist.
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Bad request.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Create or update an Environment
      tags:
      - Environments
  /cmf/api/v1/environments/{envName}:
    delete:
      operationId: deleteEnvironment
      parameters:
      - description: Name of the Environment to be deleted.
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      - description: If true, deletes the Environment from CMF metadata only, without
          requiring Kubernetes cluster connectivity. Kubernetes resources (service
          account, secret) may be orphaned.
        explode: true
        in: query
        name: force
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "204":
          description: Environment found and deleted.
        "304":
          description: Not modified.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Environment not found.
      tags:
      - Environments
    get:
      operationId: getEnvironment
      parameters:
      - description: Name of the Environment to be retrieved.
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      - description: Whether to include resource summary in the response.
        explode: true
        in: query
        name: include-resource-information
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
            application/yaml:
              schema:
                $ref: '#/components/schemas/Environment'
          description: Environment found and returned.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Environment not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Get/Describe an environment with the given name.
      tags:
      - Environments
  /cmf/api/v1/environments/{envName}/applications:
    get:
      operationId: getApplications
      parameters:
      - description: Zero-based page index (0..N)
        explode: true
        in: query
        name: page
        required: false
        schema:
          type: integer
        style: form
      - description: The size of the page to be returned
        explode: true
        in: query
        name: size
        required: false
        schema:
          type: integer
        style: form
      - description: 'Sorting criteria in the format: property,(asc|desc). Default
          sort order is ascending. Supported properties: name, metadata.name, creationTimestamp,
          metadata.creationTimestamp, updateTimestamp, metadata.updateTimestamp. Note:
          updateTimestamp sorts by the most recent spec update time. The displayed
          metadata.updateTimestamp may differ as it reflects the latest of spec or
          status changes.'
        explode: true
        in: query
        name: sort
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Whether to include resource summary in the response.
        explode: true
        in: query
        name: include-resource-information
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: 'Filter query string with comma-separated expressions. Supports:
          - Name filtering: name=foo*bar (wildcards allowed) - Label equality: labels.key
          = value or labels.key != value - Label set-based: labels.key in (value1,
          value2) or labels.key notin (value1, value2) - Label existence: labels.key
          (exists) or !labels.key (does not exist) - State filtering (Applications
          only): state=RUNNING or state in (RUNNING, FAILED) or state notin (RUNNING,
          FAILED) - Phase filtering (Statements and ComputePools): phase=PENDING or
          phase in (PENDING, RUNNING) or phase notin (PENDING, RUNNING) - Type filtering
          (Events only): type=CMF_STATUS or type in (CMF_STATUS, JOB_STATUS) or type
          notin (CMF_STATUS, JOB_STATUS) Example: ?filter=name=foo*bar,labels.environment
          in (production, qa),!labels.development Example (with state): ?filter=name=prod*,state
          in (RUNNING, FAILED) Example (with phase): ?filter=name=my-stmt*,phase in
          (PENDING, RUNNING) Example (with type): ?filter=type=CMF_STATUS or ?filter=type
          in (CMF_STATUS, JOB_STATUS)'
        explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
      - description: 'Comma-separated list of field paths to include in the response.
          Supports nested fields using dot notation. Always includes apiVersion and
          kind fields even if not explicitly requested. Example: ?fields=metadata.name,metadata.createdTimestamp,status.phase'
        explode: true
        in: query
        name: fields
        required: false
        schema:
          type: string
        style: form
      - description: Name of the Environment
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationsPage'
            application/yaml:
              schema:
                $ref: '#/components/schemas/ApplicationsPage'
          description: Application found and returned.
        "304":
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              explode: false
              schema:
                type: string
              style: simple
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Environment not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Retrieve a paginated list of all applications in the given Environment.
      tags:
      - FlinkApplications
      x-spring-paginated: true
    post:
      operationId: createOrUpdateApplication
      parameters:
      - description: Name of the Environment
        example: production
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            examples:
              basic-application:
                summary: Basic Flink Application
                value:
                  apiVersion: cmf.confluent.io/v1
                  kind: FlinkApplication
                  metadata:
                    name: state-machine
                    labels:
                      app: state-machine
                      environment: production
                    annotations:
                      description: Real-time fraud detection application
                  spec:
                    image: confluentinc/cp-flink:1.19.3-cp2
                    flinkVersion: v1_19
                    flinkConfiguration:
                      taskmanager.numberOfTaskSlots: "2"
                      metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
                      metrics.reporter.prom.port: 9249-9250
                    serviceAccount: flink
                    jobManager:
                      resource:
                        memory: 1024m
                        cpu: 1
                    taskManager:
                      resource:
                        memory: 1024m
                        cpu: 1
                    job:
                      jarURI: local:///opt/flink/examples/streaming/StateMachineExample.jar
                      state: running
                      parallelism: 2
                      upgradeMode: stateless
            schema:
              $ref: '#/components/schemas/FlinkApplication'
          application/yaml:
            examples:
              yaml-application:
                summary: Flink Application (YAML)
                value:
                  apiVersion: cmf.confluent.io/v1
                  kind: FlinkApplication
                  metadata:
                    name: news-aggregator
                    labels:
                      app: news-aggregator
                      environment: staging
                  spec:
                    image: confluentinc/cp-flink:1.19.3-cp2
                    flinkVersion: v1_19
                    flinkConfiguration:
                      taskmanager.numberOfTaskSlots: "4"
                      metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
                      metrics.reporter.prom.port: 9249-9250
                    serviceAccount: flink
                    jobManager:
                      resource:
                        memory: 1024m
                        cpu: 1
                    taskManager:
                      resource:
                        memory: 1024m
                        cpu: 1
                    job:
                      jarURI: local:///opt/flink/examples/streaming/WordCount.jar
                      state: running
                      parallelism: 4
                      upgradeMode: stateless
            schema:
              $ref: '#/components/schemas/FlinkApplication'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlinkApplication'
            application/yaml:
              schema:
                $ref: '#/components/schemas/FlinkApplication'
          description: The Application was successfully created or updated.
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Bad request.
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Request valid but invalid content.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Creates a new Flink Application or updates an existing one in the given
        Environment.
      tags:
      - FlinkApplications
  /cmf/api/v1/environments/{envName}/applications/{appName}:
    delete:
      operationId: deleteApplication
      parameters:
      - description: Name of the Environment
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the Application
        explode: false
        in: path
        name: appName
        required: true
        schema:
          type: string
        style: simple
      - description: If true, deletes the Application from CMF metadata only, without
          requiring Kubernetes cluster connectivity.
        explode: true
        in: query
        name: force
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "204":
          description: Application found and deleted.
        "304":
          description: Not modified.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Deletes an Application of the given name in the given Environment.
      tags:
      - FlinkApplications
    get:
      operationId: getApplication
      parameters:
      - description: Name of the Environment
        explode: false
        in: path
        name: envName
        required: true
        schema:
          type: string
        style: simple
      - description: Name of the Application
        explode: false
        in: path
        name: appName
        required: true
        schema:
          type: string
        style: simple
      - description: Whether to include resource summary in the response.
        explode: true
        in: query
        name: include-resource-information
        required: false
        schema:
          default: false
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlinkApplication'
            application/yaml:
              schema:
                $ref: '#/components/schemas/FlinkApplication'
          description: Application found and returned.
        "304":
          description: Not modified.
          headers:
            ETag:
              description: An ID for this version of the response.
              explode: false
              schema:
                type: string
              style: simple
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Application not found.
      summary: Retrieve an Application of the given name in the given Environment.
      tags:
      - FlinkApplications
  /cmf/api/v1alpha1/environments/{envName}/applications/{appName}/events:
