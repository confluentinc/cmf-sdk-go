components:
  parameters:
    pageParam:
      description: Zero-based page index (0..N)
      explode: true
      in: query
      name: page
      required: false
      schema:
        type: integer
      style: form
    sizeParam:
      description: The size of the page to be returned
      explode: true
      in: query
      name: size
      required: false
      schema:
        type: integer
      style: form
    sortParam:
      description: 'Sorting criteria in the format: property,(asc|desc). Default sort
        order is ascending. Multiple sort criteria are supported.'
      explode: true
      in: query
      name: sort
      required: false
      schema:
        items:
          type: string
        type: array
      style: form
    pageTokenParam:
      description: Token for the next page of results
      explode: true
      in: query
      name: page-token
      required: false
      schema:
        type: string
      style: form
    includeResourceInformationParam:
      description: Whether to include resource summary in the response.
      explode: true
      in: query
      name: include-resource-information
      required: false
      schema:
        default: false
        type: boolean
      style: form
    computePoolParam:
      description: Name of the ComputePool to filter on
      explode: true
      in: query
      name: compute-pool
      required: false
      schema:
        type: string
      style: form
    phaseParam:
      description: Phase to filter on
      explode: true
      in: query
      name: phase
      required: false
      schema:
        enum:
        - pending
        - running
        - completed
        - deleting
        - failing
        - failed
        - stopped
        type: string
      style: form
    filterParam:
      description: 'Filter query string with comma-separated expressions. Supports:
        - Name filtering: name=foo*bar (wildcards allowed) - Label equality: labels.key
        = value or labels.key != value - Label set-based: labels.key in (value1, value2)
        or labels.key notin (value1, value2) - Label existence: labels.key (exists)
        or !labels.key (does not exist) - State filtering (Applications only): state=RUNNING
        or state in (RUNNING, FAILED) or state notin (RUNNING, FAILED) - Phase filtering
        (Statements and ComputePools): phase=PENDING or phase in (PENDING, RUNNING)
        or phase notin (PENDING, RUNNING) - Type filtering (Events only): type=CMF_STATUS
        or type in (CMF_STATUS, JOB_STATUS) or type notin (CMF_STATUS, JOB_STATUS)
        Example: ?filter=name=foo*bar,labels.environment in (production, qa),!labels.development
        Example (with state): ?filter=name=prod*,state in (RUNNING, FAILED) Example
        (with phase): ?filter=name=my-stmt*,phase in (PENDING, RUNNING) Example (with
        type): ?filter=type=CMF_STATUS or ?filter=type in (CMF_STATUS, JOB_STATUS)'
      explode: true
      in: query
      name: filter
      required: false
      schema:
        type: string
      style: form
    searchParam:
      description: 'Search term to match against fields specified in searchScope.
        Note: Both search and searchScope must be provided together. If only one is
        provided, the request will be rejected. Example: ?search=foo&searchScope=name,kubernetesNamespace'
      explode: true
      in: query
      name: search
      required: false
      schema:
        type: string
      style: form
    searchScopeParam:
      description: 'Comma-separated list of fields to search in. Must be provided
        together with the search parameter. Unsupported field names will result in
        a 400 Bad Request. For Environments: supported fields are name, kubernetesNamespace.
        For Statements: supported fields are name, statement. For Events: supported
        fields are message, flinkApplicationInstance. For Secrets: supported fields
        are name, environments. When multiple fields are specified, the search uses
        OR logic. Example (Environments): ?search=foo&searchScope=name,kubernetesNamespace
        means (name contains foo OR kubernetesNamespace contains foo) Example (Statements):
        ?search=SELECT&searchScope=name,statement means (name contains SELECT OR statement
        contains SELECT) Example (Events): ?search=RUNNING&searchScope=message,flinkApplicationInstance
        means (message contains RUNNING OR flinkApplicationInstance equals RUNNING)'
      explode: true
      in: query
      name: searchScope
      required: false
      schema:
        type: string
      style: form
    fieldsParam:
      description: 'Comma-separated list of field paths to include in the response.
        Supports nested fields using dot notation. Always includes apiVersion and
        kind fields even if not explicitly requested. Example: ?fields=metadata.name,metadata.createdTimestamp,status.phase'
      explode: true
      in: query
      name: fields
      required: false
      schema:
        type: string
      style: form
  responses:
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
        application/yaml:
          schema:
            $ref: '#/components/schemas/RestError'
      description: Server error.
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
        application/yaml:
          schema:
            $ref: '#/components/schemas/RestError'
      description: Bad request.
    UnprocessableEntity:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RestError'
        application/yaml:
          schema:
            $ref: '#/components/schemas/RestError'
      description: Request valid but invalid content.
    NotModified:
      description: Not modified.
      headers:
        ETag:
          description: An ID for this version of the response.
          explode: false
          schema:
            type: string
          style: simple
  schemas:
    RestError:
      description: The schema for all error responses.
      properties:
        errors:
          description: List of all errors
          items:
            $ref: '#/components/schemas/error'
          title: errors
          type: array
      title: REST Error
      type: object
    PaginationResponse:
      properties:
        pageable:
          $ref: '#/components/schemas/Pageable'
      type: object
    Sort:
      format: sort
      properties:
        sorted:
          description: Whether the results are sorted.
          example: true
          type: boolean
        unsorted:
          description: Whether the results are unsorted.
          example: false
          type: boolean
        empty:
          type: boolean
      type: object
    Pageable:
      format: pageable
      properties:
        page:
          minimum: 0
          type: integer
        size:
          description: The number of items in a page.
          minimum: 1
          type: integer
        sort:
          $ref: '#/components/schemas/Sort'
      type: object
    ResourceBaseV2:
      properties:
        apiVersion:
          description: API version for spec
          type: string
        kind:
          description: Kind of resource - set to resource type
          type: string
      required:
      - apiVersion
      - kind
      type: object
    PostResourceBase:
      properties:
        name:
          deprecated: true
          description: A unique name for the resource.
          minLength: 4
          pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
          title: Name
          type: string
