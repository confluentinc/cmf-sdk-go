                    status:
                      state: DECOMMISSIONED
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
            application/yaml:
              schema:
                $ref: '#/components/schemas/KubernetesCluster'
          description: The Kubernetes cluster was successfully updated.
        "400":
          content:
            application/json:
              examples:
                environments-exist:
                  summary: Cluster has active environments
                  value:
                    errors:
                    - message: 'Cannot decommission cluster ''azure-k8s-cluster'':
                        referenced by environments [prod-azure, staging-azure]'
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Bad request. Validation failed (e.g., cannot decommission cluster
            because it is in use by environments).
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Kubernetes cluster not found.
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestError'
            application/yaml:
              schema:
                $ref: '#/components/schemas/RestError'
          description: Server error.
      summary: Update a Kubernetes cluster (lifecycle state, labels, annotations).
      tags:
      - KubernetesClusters
